  <title id="title">Agentic RAG README teaser</title>
  <desc id="desc">Iterative retrieval with sufficiency checks, missing-fact feedback, and claim-level citations. Key metrics: One-shot fetch 0.5, Iterative fetch 1.0, Citation lift 0.5 -&gt; 1.0, No API key demo. Pipeline: plan -&gt; route -&gt; rewrite -&gt; retrieve -&gt; judge -&gt; iterate -&gt; synthesize.</desc>
